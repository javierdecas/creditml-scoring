name: CI — Lint, Tests y Build Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Lint con flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --count --statistics

      - name: Tests con pytest y cobertura
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile.api -t creditml-api:latest .
          echo "Docker image built successfully"

      - name: Verify Docker image
        run: |
          docker run --rm creditml-api:latest python -c "import sys; print('Python version:', sys.version)"